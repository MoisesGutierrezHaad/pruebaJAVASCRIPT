<svg xmlns="http://www.w3.org/2000/svg" width="600" height="493" viewBox="0 0 600 493">
<rect width="692" height="493" fill="#ffffff"/>
<defs>
<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="4" dy="4" stdDeviation="1.5" flood-color="#000" flood-opacity="0.08"/>
</filter>
<style>
.line{stroke:#333;stroke-width:2.2;fill:none;stroke-linecap:square;stroke-linejoin:miter}
.box{rx:3;ry:3}
.txt{font-family:Arial, Helvetica, sans-serif;fill:#23343a;text-anchor:middle;dominant-baseline:middle}
.white{fill:#fff}
.big{font-size:22px;font-weight:600}
.mid{font-size:21px}
.small{font-size:20px}
</style>
</defs>

<!-- connecting lines -->
<path class="line" d="M300 70 V107"/>
<path class="line" d="M300 168 V190"/>
<path class="line" d="M95 190 H510"/>
<path class="line" d="M95 190 V211"/>
<path class="line" d="M510 190 V211"/>
<path class="line" d="M95 273 V315"/>
<path class="line" d="M95 378 V418"/>
<path class="line" d="M300 291 V310"/>
<path class="line" d="M300 291 H510"/>
<path class="line" d="M300 291 V411"/>
<path class="line" d="M510 273 V313"/>
<path class="line" d="M510 378 V411"/>

<!-- boxes -->
<rect class="box" x="220" y="27" width="158" height="55" fill="#bdeeff" filter="url(#softShadow)"/>
<rect class="box" x="220" y="107" width="158" height="65" fill="#8d63bd" filter="url(#softShadow)"/>
<rect class="box" x="15" y="209" width="158" height="65" fill="#ffb22e" filter="url(#softShadow)"/>
<rect class="box" x="15" y="308" width="158" height="65" fill="#ffdf70" filter="url(#softShadow)"/>
<rect class="box" x="15" y="400" width="158" height="65" fill="#35ac9f" filter="url(#softShadow)"/>
<rect class="box" x="220" y="400" width="158" height="65" fill="#bdeeff" filter="url(#softShadow)"/>
<rect class="box" x="220" y="308" width="158" height="65" fill="#80d2bd" filter="url(#softShadow)"/>
<rect class="box" x="430" y="209" width="158" height="65" fill="#ff5f72" filter="url(#softShadow)"/>
<rect class="box" x="430" y="311" width="158" height="65" fill="#ffdb6e" filter="url(#softShadow)"/>
<rect class="box" x="430" y="400" width="158" height="65" fill="#b55aad" filter="url(#softShadow)"/>

<!-- text -->
<text class="txt big" x="300" y="50">Document</text>

<text class="txt white small" x="300" y="130">Root Element</text>
<text class="txt white small" x="300" y="156">&lt;html&gt;</text>

<text class="txt small" x="95" y="230">Element</text>
<text class="txt small" x="95" y="256">&lt;head&gt;</text>

<text class="txt small" x="95" y="330">Element</text>
<text class="txt small" x="95" y="356">&lt;title&gt;</text>

<text class="txt white small" x="95" y="420">Text</text>
<text class="txt white small" x="95" y="446">“My title”</text>

<text class="txt small" x="300" y="420">Atribute</text>
<text class="txt small" x="300" y="446">“href”</text>

<text class="txt small" x="300" y="330">Element</text>
<text class="txt small" x="300" y="356">&lt;a&gt;</text>

<text class="txt white small" x="500" y="230">Element</text>
<text class="txt white small" x="500" y="256">&lt;body&gt;</text>

<text class="txt small" x="510" y="330">Element</text>
<text class="txt small" x="510" y="356">&lt;h1&gt;</text>

<text class="txt white small" x="510" y="420">Text</text>
<text class="txt white small" x="510" y="446">“My header”</text>
</svg>
